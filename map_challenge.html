<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة الكنوز - ميدان المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /* شريط الفرق */
        #teams-header {
            display: flex;
            justify-content: center;
            gap: 10px;
            width: 100%;
            margin: 15px 0;
            flex-wrap: wrap;
        }

        .team-score-box {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid var(--accent-color);
            padding: 5px 12px;
            border-radius: 12px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-width: 80px;
        }

        /* الحاوية الطولية لإصلاح مشكلة النزول */
/* الحاوية الطولية - نسخة الإصلاح الفوري */
.map-container {
    <div id="flyer" class="flyer-dot"></div>
    
    position: relative;
    width: 92%;
    max-width: 450px;
    min-height: 600px; /* هذا السطر يمنع الانكماش الذي ظهر في الصورة */
    margin: 10px auto;
    border: 3px solid var(--accent-color);
    border-radius: 20px;
    background: #fdf5e6;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    overflow: hidden;
}

.morocco-map {
    width: 100%;
    height: auto;
    min-height: 600px; /* لضمان تمدد الصورة طولياً */
    display: block;
    object-fit: cover;
}


        /* تنسيق النقاط الـ 12 */
        .map-point {
            position: absolute;
            width: 28px;
            height: 28px;
            background: var(--accent-color);
            border: 2px solid #fff;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #000;
            font-weight: 900;
            font-size: 0.8rem;
            cursor: pointer;
            box-shadow: 0 0 8px rgba(0,0,0,0.4);
            z-index: 10;
            transition: transform 0.2s;
        }

        .map-point:active { transform: scale(0.8); }

        /* الإحداثيات الدقيقة للخريطة الطولية (Portrait) */
        /* الإحداثيات النهائية لتطابق أيقونات الخريطة الطولية */
.p1 { top: 22%; left: 66%; }  
.p2 { top: 28%; left: 80%; }  
.p3 { top: 31%; left: 69%; }  
.p4 { top: 30%; left: 56%; }  
.p5 { top: 41%; left: 61%; }  
.p6 { top: 46%; left: 74%; }  
.p7 { top: 51%; left: 52%; }  
.p8 { top: 59%; left: 44%; }  
.p9 { top: 64%; left: 38%; }  
.p10 { top: 68%; left: 34%; } 
.p11 { top: 72%; left: 30%; } 
.p12 { top: 75%; left: 26%; } 

/* أنيميشن الشعاع الطائر */
.flyer-dot {
    position: absolute;
    width: 25px;
    height: 25px;
    background: var(--accent-color);
    border-radius: 50%;
    box-shadow: 0 0 20px #fff;
    z-index: 100;
    display: none;
    transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}

        /* نافذة السؤال */
        let lastPoint = null;

function showQuestion(num, element) {
    const flyer = document.getElementById('flyer');
    const overlay = document.getElementById('qOverlay');
    
    // إذا كانت هذه ليست المرة الأولى، اجعل الشعاع يطير
    if (lastPoint) {
        flyer.style.display = 'block';
        flyer.style.top = lastPoint.style.top;
        flyer.style.left = lastPoint.style.left;
        
        setTimeout(() => {
            flyer.style.top = element.style.top;
            flyer.style.left = element.style.left;
        }, 10);
    }
    
    lastPoint = element; // حفظ النقطة الحالية للمرة القادمة

    // إظهار نافذة السؤال بعد انتهاء الطيران (700ms)
    setTimeout(() => {
        flyer.style.display = 'none';
        document.getElementById('qTitle').innerText = `الكنز رقم ${num}`;
        document.getElementById('qContent').innerText = "جاري جلب السؤال من بنك أسئلة الأستاذ محمد أسرار...";
        overlay.style.display = 'flex';
    }, 700);
}

    </style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <div class="nav-icon" onclick="location.href='modes.html'"><i class="fas fa-arrow-right"></i></div>
        <h2 style="color: var(--accent-color); font-size: 1.2rem;">خريطة الكنوز الوطنية</h2>
        <div class="nav-icon" onclick="location.href='index.html'"><i class="fas fa-home"></i></div>
    </div>

    <div id="teams-header"></div>

    <div class="map-container">
        <!-- تأكد من تسمية الصورة في مجلدك بهذا الاسم بالضبط -->
        <img src="map.png" class="morocco-map" alt="خريطة المغرب كاملة">
        
        <div class="map-point p1" onclick="showQuestion(1)">1</div>
        <div class="map-point p2" onclick="showQuestion(2)">2</div>
        <div class="map-point p3" onclick="showQuestion(3)">3</div>
        <div class="map-point p4" onclick="showQuestion(4)">4</div>
        <div class="map-point p5" onclick="showQuestion(5)">5</div>
        <div class="map-point p6" onclick="showQuestion(6)">6</div>
        <div class="map-point p7" onclick="showQuestion(7)">7</div>
        <div class="map-point p8" onclick="showQuestion(8)">8</div>
        <div class="map-point p9" onclick="showQuestion(9)">9</div>
        <div class="map-point p10" onclick="showQuestion(10)">10</div>
        <div class="map-point p11" onclick="showQuestion(11)">11</div>
        <div class="map-point p12" onclick="showQuestion(12)">12</div>
    </div>

    <div id="qOverlay" class="question-overlay">
        <div class="question-card">
            <h3 id="qTitle" style="color: var(--accent-color); margin-bottom: 15px;"></h3>
            <div id="qContent" style="color: white; font-size: 1.1rem; margin-bottom: 20px;"></div>
            <button onclick="closeQuestion()" class="start-action" style="width:100%">إغلاق</button>
        </div>
    </div>

    <div class="master-signature">
        إعداد وتصميم الأستاذ محمد أسرار - مدرسة ميمونة أم المؤمنين
    </div>
</div>

<script>
    document.addEventListener('DOMContentLoaded', () => {
        const teams = JSON.parse(localStorage.getItem('midan_teams'));
        const header = document.getElementById('teams-header');
        if (teams && header) {
            teams.forEach(team => {
                header.innerHTML += `
                    <div class="team-score-box">
                        <span class="team-name">${team.name}</span>
                        <span class="team-points">${team.score} ن</span>
                    </div>`;
            });
        }
    });

    function showQuestion(num) {
        const overlay = document.getElementById('qOverlay');
        const content = document.getElementById('qContent');
        const title = document.getElementById('qTitle');
        title.innerText = `الكنز رقم ${num}`;
        content.innerText = "السؤال قادم من بنك الأسئلة الخاص بالأستاذ محمد أسرار...";
        overlay.style.display = 'flex';
    }

    function closeQuestion() {
        document.getElementById('qOverlay').style.display = 'none';
    }
</script>

</body>
</html>
