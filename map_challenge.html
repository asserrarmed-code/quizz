<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ميدان المعرفة - خريطة الكنوز</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --accent-color: #ffcc00; --dark-bg: #0d1b2a; }
        body { background-color: var(--dark-bg); font-family: 'Cairo', sans-serif; margin: 0; color: white; }

        /* لوحة تحكم الفرق (أعلى الخريطة) */
        .scoreboard {
            display: flex;
            justify-content: center;
            gap: 10px;
            padding: 15px;
            flex-wrap: wrap;
            background: rgba(255,255,255,0.05);
        }
        .team-card {
            background: #1b263b;
            border: 2px solid var(--accent-color);
            padding: 8px;
            border-radius: 12px;
            text-align: center;
            min-width: 90px;
        }
        .score-controls { display: flex; justify-content: space-around; margin-top: 5px; }
        .btn-score { background: none; border: 1px solid white; color: white; cursor: pointer; border-radius: 4px; padding: 2px 8px; }
        .btn-score:hover { background: var(--accent-color); color: black; }

        /* حاوية الخريطة المرنة */
        .map-container {
            position: relative;
            width: 95%;
            max-width: 480px;
            aspect-ratio: 9 / 16;
            margin: 10px auto;
            border: 4px solid var(--accent-color);
            border-radius: 20px;
            background: #fdf5e6;
            overflow: hidden;
        }
        .morocco-map { width: 100%; height: 100%; display: block; object-fit: cover; }

        /* إحداثيات مصححة بناءً على 1000046210.jpg (الخط الساحلي) */
        .map-point {
            position: absolute;
            width: 7.5%;
            aspect-ratio: 1/1;
            background: var(--accent-color);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: clamp(10px, 3.5vw, 16px);
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%);
        }

        /* تعديلات دقيقة جداً للأرقام لتقع فوق الأيقونات الذهبية تماماً */
        .p1 { top: 12.5%; left: 66%; }  /* طنجة */
        .p2 { top: 28.5%; left: 81%; }  /* وجدة */
        .p3 { top: 32.5%; left: 71%; }  /* فاس */
        .p4 { top: 33.5%; left: 56.5%; } /* الرباط */
        .p5 { top: 44.5%; left: 61.5%; } /* مراكش */
        .p6 { top: 48.5%; left: 74%; }  /* تافيلالت */
        .p7 { top: 54.5%; left: 53.5%; } /* أكادير */
        .p8 { top: 59.2%; left: 45.5%; } /* كلميم */
        .p9 { top: 64.5%; left: 39%; }   /* العيون */
        .p10 { top: 69.8%; left: 35.5%; } /* بوجدور */
        .p11 { top: 73.8%; left: 31%; }   /* الداخلة */
        .p12 { top: 77.5%; left: 26.5%; } /* الكويرة */

        .flyer-dot {
            position: absolute; width: 6%; aspect-ratio: 1/1; background: gold;
            border-radius: 50%; box-shadow: 0 0 20px #fff; z-index: 100;
            display: none; transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(-50%, -50%);
        }
    </style>
</head>
<body>

<div class="scoreboard" id="scoreboard">
    <!-- سيتم توليد الفرق هنا برمجياً -->
</div>

<div class="map-container">
    <img src="watermarked_img_9363607304584003144.png" class="morocco-map">
    <div id="flyer" class="flyer-dot"></div>
    
    <!-- نقاط الكنوز -->
    <div class="map-point p1" onclick="handleStep(1, this)">1</div>
    <div class="map-point p2" onclick="handleStep(2, this)">2</div>
    <div class="map-point p3" onclick="handleStep(3, this)">3</div>
    <div class="map-point p4" onclick="handleStep(4, this)">4</div>
    <div class="map-point p5" onclick="handleStep(5, this)">5</div>
    <div class="map-point p6" onclick="handleStep(6, this)">6</div>
    <div class="map-point p7" onclick="handleStep(7, this)">7</div>
    <div class="map-point p8" onclick="handleStep(8, this)">8</div>
    <div class="map-point p9" onclick="handleStep(9, this)">9</div>
    <div class="map-point p10" onclick="handleStep(10, this)">10</div>
    <div class="map-point p11" onclick="handleStep(11, this)">11</div>
    <div class="map-point p12" onclick="handleStep(12, this)">12</div>
</div>

<script>
    // نظام إدارة الفرق واللوحة
    let teams = JSON.parse(localStorage.getItem('midan_teams')) || [
        {name: "فريق 1", score: 0}, {name: "فريق 2", score: 0}
    ];

    function renderScoreboard() {
        const board = document.getElementById('scoreboard');
        board.innerHTML = '';
        teams.forEach((team, index) => {
            board.innerHTML += `
                <div class="team-card">
                    <div style="font-size:0.8rem">${team.name}</div>
                    <div id="score-${index}" style="font-weight:900; color:var(--accent-color)">${team.score}</div>
                    <div class="score-controls">
                        <button class="btn-score" onclick="updateScore(${index}, 5)">+</button>
                        <button class="btn-score" onclick="updateScore(${index}, -5)">-</button>
                    </div>
                </div>`;
        });
    }

    function updateScore(index, val) {
        teams[index].score += val;
        document.getElementById(`score-${index}`).innerText = teams[index].score;
        localStorage.setItem('midan_teams', JSON.stringify(teams));
    }

    // نظام الطيران والأسئلة
    let lastPoint = null;
    function handleStep(num, element) {
        const flyer = document.getElementById('flyer');
        if (lastPoint) {
            flyer.style.display = 'block';
            flyer.style.top = lastPoint.style.top || window.getComputedStyle(lastPoint).top;
            flyer.style.left = lastPoint.style.left || window.getComputedStyle(lastPoint).left;
            setTimeout(() => {
                flyer.style.top = element.style.top || window.getComputedStyle(element).top;
                flyer.style.left = element.style.left || window.getComputedStyle(element).left;
            }, 50);
        }
        lastPoint = element;
        setTimeout(() => { 
            flyer.style.display = 'none'; 
            alert("سؤال الكنز " + num); // استبدلها بنافذة السؤال الخاصة بك
        }, 800);
    }

    renderScoreboard();
</script>
</body>
</html>
