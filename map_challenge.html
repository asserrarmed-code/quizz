<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة الكنوز - ميدان المعرفة</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="style.css">
    <style>
        /<style>
    /* حاوية الخريطة: جعلناها مرنة لتناسب أي حجم شاشة */
    .map-container {
        position: relative;
        width: 100%;
        max-width: 450px;
        margin: 0 auto;
        border: 3px solid var(--accent-color);
        border-radius: 20px;
        background: rgba(255,255,255,0.02);
        padding: 5px;
    }

    .morocco-map {
        width: 100%;
        height: auto; /* لتجنب التشويه */
        display: block;
    }

    /* تصميم نقاط الكنوز (الأرقام) */
    .map-point {
        position: absolute;
        width: 28px;
        height: 28px;
        background: var(--accent-color);
        color: var(--primary-color);
        border-radius: 50%;
        display: flex;
        justify-content: center;
        align-items: center;
        font-weight: bold;
        font-size: 0.8rem;
        cursor: pointer;
        box-shadow: 0 0 10px rgba(212, 175, 55, 0.6);
        transition: 0.3s;
        border: 2px solid #fff;
    }

    .map-point:hover { transform: scale(1.3); background: #fff; }

    /* ميزان المواقع: يمكنك تعديل النسبة المئوية (top و left) لتضع الرقم فوق المدينة بدقة */
    .p1 { top: 5%;  left: 68%; } /* طنجة */
    .p2 { top: 12%; left: 75%; } /* وجدة */
    .p3 { top: 18%; left: 58%; } /* فاس */
    .p4 { top: 20%; left: 45%; } /* الرباط */
    .p5 { top: 35%; left: 48%; } /* مراكش */
    .p6 { top: 45%; left: 35%; } /* أكادير */
    .p7 { top: 60%; left: 28%; } /* العيون */
    .p8 { top: 80%; left: 18%; } /* الداخلة */
    .p9 { top: 92%; left: 12%; } /* الكويرة */
</style>

<div class="map-container">
    <!-- صورة الخريطة الكاملة -->
    <img src="morocco_full.png" class="morocco-map" alt="خريطة المغرب كاملة">
    
    <!-- توزيع الأسئلة (يمكنك إضافة المزيد بنفس الطريقة) -->
    <div class="map-point p1" onclick="showQuestion('tangier')">1</div>
    <div class="map-point p2" onclick="showQuestion('oujda')">2</div>
    <div class="map-point p3" onclick="showQuestion('fes')">3</div>
    <div class="map-point p4" onclick="showQuestion('rabat')">4</div>
    <div class="map-point p5" onclick="showQuestion('marrakesh')">5</div>
    <div class="map-point p6" onclick="showQuestion('agadir')">6</div>
    <div class="map-point p7" onclick="showQuestion('laayoune')">7</div>
    <div class="map-point p8" onclick="showQuestion('dakhla')">8</div>
    <div class="map-point p9" onclick="showQuestion('lagouira')">9</div>
</div>

    </style>
</head>
<body>

<div class="app-container">
    <div class="top-nav">
        <div class="nav-icon" onclick="location.href='modes.html'"><i class="fas fa-arrow-right"></i></div>
        <h2 style="color: var(--accent-color);">خريطة الكنوز</h2>
        <div class="nav-icon" onclick="location.href='index.html'"><i class="fas fa-home"></i></div>
    </div>

    <!-- منطقة عرض أسماء الفرق ونقاطهم -->
    <div id="teams-header"></div>

    <div class="map-container">
        <img src="morocco_full.png" class="morocco-map" alt="خريطة المملكة المغربية كاملة">
        
        <div class="map-point point-tangier" onclick="showQuestion('tangier')">1</div>
        <div class="map-point point-marrakesh" onclick="showQuestion('marrakesh')">2</div>
        <div class="map-point point-laayoune" onclick="showQuestion('laayoune')">3</div>
        <div class="map-point point-dakhla" onclick="showQuestion('dakhla')">4</div>
        <div class="map-point point-lagouira" onclick="showQuestion('lagouira')">5</div>
    </div>

    <div id="qOverlay" class="question-overlay">
        <div class="question-card">
            <h3 id="qTitle" style="color: var(--accent-color); margin-bottom: 15px;"></h3>
            <div id="qContent" style="color: white; font-size: 1.2rem; margin-bottom: 20px;"></div>
            <button onclick="closeQuestion()" class="start-action" style="display:block; width:100%">إغلاق</button>
        </div>
    </div>

    <div class="master-signature">
        إعداد وتصميم الأستاذ محمد أسرار - مدرسة ميمونة أم المؤمنين
    </div>
</div>

<script>
    // عند تحميل الصفحة: جلب الفرق وعرضها
    document.addEventListener('DOMContentLoaded', () => {
        const teams = JSON.parse(localStorage.getItem('midan_teams'));
        const header = document.getElementById('teams-header');

        if (teams && header) {
            teams.forEach(team => {
                header.innerHTML += `
                    <div class="team-score-box">
                        <span class="team-name">${team.name}</span>
                        <span class="team-points" id="score_${team.id}">${team.score} ن</span>
                    </div>`;
            });
        }
    });

    function showQuestion(city) {
        const overlay = document.getElementById('qOverlay');
        const content = document.getElementById('qContent');
        const title = document.getElementById('qTitle');

        if(city === 'marrakesh') {
            title.innerText = "كنز مراكش";
            content.innerText = "من هو مؤسس مدينة مراكش؟";
        } else if(city === 'tangier') {
            title.innerText = "كنز طنجة";
            content.innerText = "ما هو اللقب الذي يطلق على مدينة طنجة؟";
        } else {
            title.innerText = "تحدي جديد";
            content.innerText = "السؤال قادم من بنك الأسئلة...";
        }
        
        overlay.style.display = 'flex';
    }

    function closeQuestion() {
        document.getElementById('qOverlay').style.display = 'none';
    }
</script>

</body>
</html>
