<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خريطة الكنوز - ميدان المعرفة الشامل</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@700;900&display=swap" rel="stylesheet">
    <style>
        :root { --accent-color: #ffcc00; }
        body { background-color: #0d1b2a; font-family: 'Cairo', sans-serif; margin: 0; padding: 0; }

        /* الحاوية المرنة للحاسوب والهاتف */
        .map-container {
            position: relative;
            width: 95%;
            max-width: 450px; /* يحافظ على تناسقها في الحاسوب */
            aspect-ratio: 9 / 16; /* يثبت نسبة أبعاد الصورة */
            margin: 20px auto;
            border: 4px solid var(--accent-color);
            border-radius: 25px;
            background: #fdf5e6;
            overflow: hidden;
            box-shadow: 0 15px 35px rgba(0,0,0,0.5);
        }

        .morocco-map {
            width: 100%;
            height: 100%;
            display: block;
            object-fit: cover;
        }

        /* تنسيق النقاط - مرن بالنسبة المئوية */
        .map-point {
            position: absolute;
            width: 7%; /* حجم النقطة يتغير آلياً مع حجم الخريطة */
            aspect-ratio: 1/1;
            background: var(--accent-color);
            color: #000;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-weight: 900;
            font-size: clamp(10px, 3vw, 16px); /* حجم خط مرن */
            border: 2px solid #fff;
            cursor: pointer;
            z-index: 10;
            transform: translate(-50%, -50%); /* يضمن تمركز النقطة فوق الزخرفة */
            transition: transform 0.2s;
        }

        .map-point:hover { transform: translate(-50%, -50%) scale(1.2); }

        /* الإحداثيات النهائية الدقيقة (بناءً على الصورة 1000046152.jpg) */
        .p1 { top: 22.5%; left: 68.5%; }  
        .p2 { top: 28.5%; left: 81.5%; }  
        .p3 { top: 31.8%; left: 71.5%; }  
        .p4 { top: 30.5%; left: 58.5%; }  
        .p5 { top: 41.5%; left: 63.5%; }  
        .p6 { top: 46.8%; left: 76.5%; }  
        .p7 { top: 51.5%; left: 54.5%; }  
        .p8 { top: 59.5%; left: 46.5%; }  
        .p9 { top: 64.5%; left: 40.5%; }  
        .p10 { top: 68.8%; left: 36.5%; } 
        .p11 { top: 72.8%; left: 32.5%; } 
        .p12 { top: 75.8%; left: 28.5%; } 

        /* أنيميشن الشعاع الطائر */
        .flyer-dot {
            position: absolute;
            width: 6%;
            aspect-ratio: 1/1;
            background: gold;
            border-radius: 50%;
            box-shadow: 0 0 20px #fff;
            z-index: 100;
            display: none;
            pointer-events: none;
            transition: all 0.7s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            transform: translate(-50%, -50%);
        }

        .master-signature {
            text-align: center;
            color: white;
            font-size: 0.8rem;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>

<div class="map-container">
    <!-- صورة الخريطة -->
    <img src="watermarked_img_9363607304584003144.png" class="morocco-map">
    
    <!-- عنصر الشعاع الطائر -->
    <div id="flyer" class="flyer-dot"></div>
    
    <!-- نقاط الكنوز -->
    <div class="map-point p1" onclick="showQuestion(1, this)">1</div>
    <div class="map-point p2" onclick="showQuestion(2, this)">2</div>
    <div class="map-point p3" onclick="showQuestion(3, this)">3</div>
    <div class="map-point p4" onclick="showQuestion(4, this)">4</div>
    <div class="map-point p5" onclick="showQuestion(5, this)">5</div>
    <div class="map-point p6" onclick="showQuestion(6, this)">6</div>
    <div class="map-point p7" onclick="showQuestion(7, this)">7</div>
    <div class="map-point p8" onclick="showQuestion(8, this)">8</div>
    <div class="map-point p9" onclick="showQuestion(9, this)">9</div>
    <div class="map-point p10" onclick="showQuestion(10, this)">10</div>
    <div class="map-point p11" onclick="showQuestion(11, this)">11</div>
    <div class="map-point p12" onclick="showQuestion(12, this)">12</div>
</div>

<div class="master-signature">
    إعداد وتصميم الأستاذ محمد أسرار - مدرسة ميمونة أم المؤمنين
</div>

<script>
    let lastPoint = null;

    function showQuestion(num, element) {
        const flyer = document.getElementById('flyer');
        
        // جلب الإحداثيات بالنسبة المئوية
        const targetTop = element.style.top || window.getComputedStyle(element).top;
        const targetLeft = element.style.left || window.getComputedStyle(element).left;

        if (lastPoint) {
            // إعداد نقطة الانطلاق
            flyer.style.display = 'block';
            flyer.style.top = lastPoint.style.top || window.getComputedStyle(lastPoint).top;
            flyer.style.left = lastPoint.style.left || window.getComputedStyle(lastPoint).left;
            
            // بدء الطيران
            setTimeout(() => {
                flyer.style.top = targetTop;
                flyer.style.left = targetLeft;
            }, 50);
        }

        lastPoint = element;

        // فتح السؤال بعد الوصول
        setTimeout(() => {
            flyer.style.display = 'none';
            console.log("فتح كنز رقم: " + num);
            // أضف هنا الكود الذي يظهر نافذة السؤال
        }, 800);
    }
</script>

</body>
</html>
